<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 フォーカス・畑</title>
<!-- PWA: アプリとしてホーム画面に追加できるようにする -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2d4a3e">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="畑">
<style>
  :root {
    --bg1: #1a2a3a;
    --bg2: #2d4a3e;
    --accent: #6dd47e;
    --accent-dark: #4caf6a;
    --text: #eaf3ee;
    --muted: #9fb3a8;
    --danger: #e57373;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 0;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

  .timer-card {
    background: rgba(0,0,0,0.2);
    border-radius: 24px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 360px;
  }
  .mode-label {
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .time {
    font-size: 4.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 8px;
  }
  .seedling {
    font-size: 2.5rem;
    height: 48px;
    transition: transform 0.4s;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
  }
  button {
    border: none;
    border-radius: 14px;
    padding: 12px 22px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    color: #10221a;
    background: var(--accent);
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(0); }
  button.secondary {
    background: rgba(255,255,255,0.12);
    color: var(--text);
  }
  button:disabled { opacity: 0.4; cursor: default; transform: none; }

  .stats {
    margin-top: 18px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .stats b { color: var(--text); }

  .panel { width: 100%; max-width: 560px; margin-top: 28px; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .panel-header h2 { font-size: 1rem; font-weight: 600; }
  .reset-link {
    background: none; padding: 4px 8px; font-size: 0.75rem;
    color: var(--muted); font-weight: 400;
  }
  .card {
    background: rgba(0,0,0,0.18);
    border-radius: 18px;
    padding: 18px;
  }

  /* 庭 */
  .garden {
    min-height: 80px;
    display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start;
  }
  .plant {
    font-size: 1.8rem;
    animation: sprout 0.6s ease-out;
    cursor: default;
  }
  .garden .empty, .empty { color: var(--muted); font-size: 0.85rem; align-self: center; }
  @keyframes sprout {
    0% { transform: scale(0) translateY(10px); opacity: 0; }
    60% { transform: scale(1.3) translateY(-4px); }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .wilt { animation: wilt 0.5s ease-in forwards; }
  @keyframes wilt {
    0% { transform: rotate(0); }
    100% { transform: rotate(-25deg) translateY(6px); opacity: 0.5; }
  }

  /* 週間チャート */
  .week-chart {
    display: flex; align-items: flex-end; justify-content: space-between;
    height: 130px; gap: 8px;
  }
  .week-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .bar {
    width: 100%; max-width: 42px;
    background: linear-gradient(180deg, var(--accent), var(--accent-dark));
    border-radius: 8px 8px 4px 4px;
    min-height: 4px;
    transition: height 0.5s ease;
    position: relative;
  }
  .bar.empty-bar { background: rgba(255,255,255,0.08); }
  .bar-val { font-size: 0.75rem; color: var(--text); margin-bottom: 4px; height: 16px; }
  .bar-label { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }
  .week-col.today .bar-label { color: var(--accent); font-weight: 700; }
  .week-col.today .bar { box-shadow: 0 0 0 2px var(--accent), 0 0 12px rgba(109,212,126,0.5); }
  .week-summary { text-align: center; margin-top: 12px; font-size: 0.85rem; color: var(--muted); }
  .week-summary b { color: var(--text); }

  /* 今日のタイムライン */
  .timeline {
    position: relative; height: 44px; margin: 6px 4px 0;
    border-left: 1px solid rgba(255,255,255,0.15);
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .timeline .track {
    position: absolute; top: 50%; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.12);
  }
  .timeline .dot {
    position: absolute; top: 50%; width: 12px; height: 12px;
    margin: -6px 0 0 -6px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 8px rgba(109,212,126,0.7);
    animation: sprout 0.5s ease-out;
  }
  .timeline-axis { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); margin-top: 4px; padding: 0 2px; }
  .timeline-info { margin-top: 12px; font-size: 0.85rem; color: var(--muted); }
  .timeline-info b { color: var(--text); }

  /* 総合記録 */
  .totals { display: flex; gap: 10px; }
  .total-box {
    flex: 1; text-align: center;
    background: rgba(255,255,255,0.05); border-radius: 14px; padding: 14px 8px;
  }
  .total-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .total-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  /* 時間帯ヒートマップ（24時間） */
  .heat { display: flex; gap: 3px; margin-top: 6px; }
  .heat-cell {
    flex: 1; height: 30px; border-radius: 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
  }
  .heat-axis { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted); margin-top: 5px; }
  .heat-legend { font-size: 0.8rem; color: var(--muted); margin-top: 10px; text-align: center; }
  .heat-legend b { color: var(--text); }

  footer { color: var(--muted); font-size: 0.75rem; margin: 32px 0 16px; text-align: center; }
</style>
</head>
<body>
  <h1>🌱 フォーカス・畑</h1>
  <div class="subtitle">集中するたび、畑に植物が育ちます</div>

  <div class="timer-card">
    <div class="mode-label" id="modeLabel">集中タイム</div>
    <div class="time" id="time">25:00</div>
    <div class="seedling" id="seedling">🌱</div>
    <div class="controls">
      <button id="startBtn">スタート</button>
      <button id="resetBtn" class="secondary">リセット</button>
    </div>
    <div class="stats">
      今日の収穫: <b id="todayCount">0</b> 本 ・ 連続集中: <b id="streak">0</b>
    </div>
  </div>

  <!-- 今日のタイムライン -->
  <div class="panel">
    <div class="panel-header"><h2>⏰ 今日いつ集中した?</h2></div>
    <div class="card">
      <div class="timeline" id="timeline"><div class="track"></div></div>
      <div class="timeline-axis"><span>0時</span><span>6時</span><span>12時</span><span>18時</span><span>24時</span></div>
      <div class="timeline-info" id="timelineInfo"></div>
    </div>
  </div>

  <!-- 週間チャート -->
  <div class="panel">
    <div class="panel-header"><h2>📊 この1週間</h2></div>
    <div class="card">
      <div class="week-chart" id="weekChart"></div>
      <div class="week-summary" id="weekSummary"></div>
    </div>
  </div>

  <!-- 総合記録 + 時間帯ヒートマップ -->
  <div class="panel">
    <div class="panel-header"><h2>🏆 総合記録</h2></div>
    <div class="card">
      <div class="totals">
        <div class="total-box"><div class="total-num" id="totSessions">0</div><div class="total-label">合計の本数</div></div>
        <div class="total-box"><div class="total-num" id="totTime">0分</div><div class="total-label">合計の集中時間</div></div>
        <div class="total-box"><div class="total-num" id="bestStreak">0</div><div class="total-label">連続記録ベスト</div></div>
      </div>
      <div style="margin-top:18px;font-size:0.85rem;color:var(--muted)">時間帯のクセ（いつ集中しがち?）</div>
      <div class="heat" id="heat"></div>
      <div class="heat-axis"><span>0時</span><span>6時</span><span>12時</span><span>18時</span><span>23時</span></div>
      <div class="heat-legend" id="heatLegend"></div>
    </div>
  </div>

  <!-- 庭 -->
  <div class="panel">
    <div class="panel-header">
      <h2>🪴 あなたの庭</h2>
      <button class="reset-link" id="clearGarden">記録をリセット</button>
    </div>
    <div class="card garden" id="garden"></div>
  </div>

  <footer>
    Tab を離れたり止めたりすると、育ちかけの芽はしおれます🥀<br>
    記録はこのブラウザに保存されます。
  </footer>

<script>
(function () {
  const FOCUS_MIN = 25;        // 集中時間（分）
  const BREAK_MIN = 5;         // 休憩時間（分）
  const PLANTS = ['🌷','🌻','🌹','🌼','🌵','🍀','🌴','🌸','🪴','🌾'];
  const DAY_LABELS = ['日','月','火','水','木','金','土'];

  const $ = id => document.getElementById(id);
  const timeEl = $('time'), modeEl = $('modeLabel'), seedlingEl = $('seedling');
  const startBtn = $('startBtn'), resetBtn = $('resetBtn');
  const gardenEl = $('garden'), todayEl = $('todayCount'), streakEl = $('streak');

  let mode = 'focus';          // 'focus' | 'break'
  let remaining = FOCUS_MIN * 60;
  let timerId = null;
  let running = false;

  // ---- 保存データ ----
  // すべての「完了した集中セッション」のログを1か所に持つ:
  //   fg_log = [{ t: タイムスタンプ(ms), plant: '🌷' }, ...]
  // 今日の本数・週間・タイムライン・庭は、すべてこのログから計算する。
  function loadLog() {
    try { return JSON.parse(localStorage.getItem('fg_log') || '[]'); }
    catch (e) { return []; }
  }
  function saveLog(arr) { localStorage.setItem('fg_log', JSON.stringify(arr)); }
  let streak = +(localStorage.getItem('fg_streak') || 0);
  let bestStreak = +(localStorage.getItem('fg_best_streak') || 0);

  // 旧バージョン(fg_garden)からの移行: ログが空で庭があれば、今日として取り込む
  (function migrate() {
    if (loadLog().length) return;
    let old; try { old = JSON.parse(localStorage.getItem('fg_garden') || '[]'); } catch (e) { old = []; }
    if (old.length) {
      const now = Date.now();
      saveLog(old.map((plant, i) => ({ t: now - (old.length - i) * 60000, plant })));
    }
  })();

  const startOfDay = d => { const x = new Date(d); x.setHours(0,0,0,0); return x.getTime(); };
  const sameDay = (a, b) => startOfDay(a) === startOfDay(b);
  function todayCount() {
    const now = Date.now();
    return loadLog().filter(e => sameDay(e.t, now)).length;
  }

  // ---- 時刻フォーマット ----
  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }
  const hhmm = t => {
    const d = new Date(t);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  };

  // ---- 描画: タイマー ----
  function render() {
    timeEl.textContent = fmt(remaining);
    modeEl.textContent = mode === 'focus' ? '集中タイム' : '休憩タイム';
    startBtn.textContent = running ? '一時停止' : 'スタート';
    todayEl.textContent = todayCount();
    streakEl.textContent = streak;
    if (mode === 'focus') {
      const done = 1 - remaining / (FOCUS_MIN * 60);
      seedlingEl.textContent = done > 0.75 ? '🌿' : '🌱';
    } else {
      seedlingEl.textContent = '☕';
    }
  }

  // ---- 描画: 庭 ----
  function renderGarden() {
    const plants = loadLog().map(e => e.plant);
    gardenEl.innerHTML = plants.length
      ? plants.map(p => `<span class="plant">${p}</span>`).join('')
      : '<span class="empty">まだ何も植わっていません。集中を1回終えてみましょう。</span>';
  }

  // ---- 描画: 今日のタイムライン ----
  function renderTimeline() {
    const el = $('timeline');
    el.querySelectorAll('.dot').forEach(d => d.remove());
    const now = Date.now();
    const today = loadLog().filter(e => sameDay(e.t, now)).sort((a,b) => a.t - b.t);
    const info = $('timelineInfo');
    if (!today.length) {
      info.innerHTML = '<span class="empty">今日はまだ集中していません。</span>';
      return;
    }
    today.forEach(e => {
      const d = new Date(e.t);
      const frac = (d.getHours() * 60 + d.getMinutes()) / 1440; // 0〜1
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = (frac * 100) + '%';
      dot.title = hhmm(e.t) + ' ' + e.plant;
      el.appendChild(dot);
    });
    const first = today[0].t, last = today[today.length - 1].t;
    info.innerHTML = `今日 <b>${today.length}</b> 回 ・ 最初 <b>${hhmm(first)}</b> 〜 最後 <b>${hhmm(last)}</b> ・ 合計 <b>${today.length * FOCUS_MIN}</b> 分`;
  }

  // ---- 描画: 週間チャート（過去7日） ----
  function renderWeek() {
    const log = loadLog();
    const days = [];
    const now = new Date();
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(now.getDate() - i);
      const count = log.filter(e => sameDay(e.t, d.getTime())).length;
      days.push({ date: d, count, label: DAY_LABELS[d.getDay()], isToday: i === 0 });
    }
    const max = Math.max(1, ...days.map(d => d.count));
    $('weekChart').innerHTML = days.map(d => {
      const h = d.count ? Math.round((d.count / max) * 100) : 0;
      return `<div class="week-col ${d.isToday ? 'today' : ''}">
        <div class="bar-val">${d.count || ''}</div>
        <div class="bar ${d.count ? '' : 'empty-bar'}" style="height:${h}%"></div>
        <div class="bar-label">${d.label}</div>
      </div>`;
    }).join('');
    const total = days.reduce((s, d) => s + d.count, 0);
    const activeDays = days.filter(d => d.count).length;
    $('weekSummary').innerHTML = `7日間で <b>${total}</b> 本 ・ <b>${total * FOCUS_MIN}</b> 分 ・ 活動した日 <b>${activeDays}</b>/7`;
  }

  // ---- 描画: 総合記録 ----
  function renderStats() {
    const log = loadLog();
    const total = log.length;
    const minutes = total * FOCUS_MIN;
    const h = Math.floor(minutes / 60), m = minutes % 60;
    $('totSessions').textContent = total + '本';
    $('totTime').textContent = h ? `${h}時間${m}分` : `${m}分`;
    $('bestStreak').textContent = bestStreak;
  }

  // ---- 描画: 時間帯ヒートマップ（全期間を24時間に集計） ----
  function renderHeatmap() {
    const buckets = new Array(24).fill(0);
    loadLog().forEach(e => { buckets[new Date(e.t).getHours()]++; });
    const max = Math.max(0, ...buckets);
    $('heat').innerHTML = buckets.map((c, h) => {
      const intensity = max ? c / max : 0;
      const bg = c
        ? `rgba(109,212,126,${0.18 + intensity * 0.82})`
        : 'rgba(255,255,255,0.06)';
      return `<div class="heat-cell" style="background:${bg}" title="${h}時台: ${c}本"></div>`;
    }).join('');
    const legend = $('heatLegend');
    if (!max) { legend.innerHTML = '<span class="empty">データがたまると、集中しがちな時間帯が見えてきます。</span>'; return; }
    const peak = buckets.indexOf(max);
    legend.innerHTML = `いちばん集中しているのは <b>${peak}時台</b>（${max}本）`;
  }

  function renderAll() { render(); renderGarden(); renderTimeline(); renderWeek(); renderStats(); renderHeatmap(); }

  // ---- タイマー本体 ----
  function tick() {
    remaining--;
    if (remaining <= 0) { complete(); return; }
    render();
  }
  function start() {
    running = true;
    timerId = setInterval(tick, 1000);
    render();
  }
  function pause(wilt) {
    running = false;
    clearInterval(timerId);
    if (wilt && mode === 'focus' && remaining < FOCUS_MIN * 60) {
      seedlingEl.textContent = '🥀';
      seedlingEl.classList.add('wilt');
      setTimeout(() => seedlingEl.classList.remove('wilt'), 600);
      streak = 0;
      localStorage.setItem('fg_streak', 0);
    }
    render();
  }
  function complete() {
    clearInterval(timerId);
    running = false;
    if (mode === 'focus') {
      // 完了した集中をログに記録（時刻つき）→ 植物が1本増える
      const plant = PLANTS[Math.floor(Math.random() * PLANTS.length)];
      const log = loadLog();
      log.push({ t: Date.now(), plant });
      saveLog(log);
      streak++; localStorage.setItem('fg_streak', streak);
      if (streak > bestStreak) { bestStreak = streak; localStorage.setItem('fg_best_streak', bestStreak); }
      renderGarden(); renderTimeline(); renderWeek(); renderStats(); renderHeatmap();
      flash('🎉 1本 収穫！休憩しましょう');
      mode = 'break'; remaining = BREAK_MIN * 60;
    } else {
      flash('☕ 休憩おわり。次の集中へ！');
      mode = 'focus'; remaining = FOCUS_MIN * 60;
    }
    render();
  }
  function reset() {
    pause(false);
    mode = 'focus'; remaining = FOCUS_MIN * 60;
    render();
  }
  function flash(msg) {
    modeEl.textContent = msg;
    try { new Audio('data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YRAAAAAAAP//AgD9/wQA+/8GAA==').play(); } catch(e) {}
  }

  // ---- イベント ----
  startBtn.onclick = () => running ? pause(true) : start();
  resetBtn.onclick = reset;
  $('clearGarden').onclick = () => {
    if (confirm('すべての記録（庭・週間・タイムライン）を消去しますか?')) {
      saveLog([]);
      streak = 0; localStorage.setItem('fg_streak', 0);
      bestStreak = 0; localStorage.setItem('fg_best_streak', 0);
      renderAll();
    }
  };
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && mode === 'focus') pause(true);
  });

  renderAll();

  // ---- PWA: Service Worker を登録（オフライン動作 + アプリ化） ----
  // file:// では動かないので、http(s)/localhost で開いたときだけ登録する
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
